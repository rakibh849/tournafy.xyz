<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>সহজ মুভি ওয়েবসাইট</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f9f9f9;
            color: #333;
        }
        h1 {
            text-align: center;
        }
        .movie-list {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .movie-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 6px rgba(0,0,0,0.1);
            width: 180px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s;
        }
        .movie-card:hover {
            transform: scale(1.05);
        }
        .movie-card img {
            width: 100%;
            border-radius: 8px 8px 0 0;
        }
        .movie-card h3 {
            margin: 10px 0;
            font-size: 16px;
        }
        @media (max-width: 600px) {
            .movie-list {
                flex-direction: column;
                align-items: center;
            }
            .movie-card {
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <h1>সহজ মুভি ওয়েবসাইট</h1>
    <div class="movie-list" id="movieList">
        <!-- মুভি কার্ড গুলো এখানে জাভাস্ক্রিপ্ট দিয়ে আসবে -->
    </div>

    <script>
        // মুভি ডাটা (তোমার মুভি লিস্ট)
        const movies = [
            {
                id: 1,
                title: "Example Movie 1",
                thumbnail: "https://via.placeholder.com/180x270?text=Movie+1",
                description: "এই মুভিটা একটা সুন্দর গল্পের মুভি।",
                videoUrl: "https://www.youtube.com/embed/dQw4w9WgXcQ"
            },
            {
                id: 2,
                title: "Example Movie 2",
                thumbnail: "https://via.placeholder.com/180x270?text=Movie+2",
                description: "আরেকটি দারুণ মুভি।",
                videoUrl: "https://www.youtube.com/embed/3JZ_D3ELwOQ"
            }
        ];

        const movieList = document.getElementById("movieList");

        movies.forEach(movie => {
            const card = document.createElement("div");
            card.className = "movie-card";
            card.innerHTML = `
                <img src="${movie.thumbnail}" alt="${movie.title}" />
                <h3>${movie.title}</h3>
            `;

            // ক্লিক করলে ডিটেইল পেজে যাবে (localStorage দিয়ে ডাটা পাঠাবো)
            card.addEventListener("click", () => {
                localStorage.setItem("selectedMovie", JSON.stringify(movie));
                window.location.href = "movie.html";
            });

            movieList.appendChild(card);
        });
    </script>
</body>
</html>
