<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Boom Flim</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: #eee;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #fff;
        }
        .section-title {
            font-size: 22px;
            margin: 40px 0 15px;
            border-left: 5px solid #ff4444;
            padding-left: 12px;
            color: #ffcccc;
        }
        .search-container {
            text-align: center;
            margin-bottom: 30px;
        }
        input[type="text"] {
            width: 300px;
            max-width: 90%;
            padding: 10px 15px;
            border-radius: 25px;
            border: none;
            outline: none;
            font-size: 16px;
        }
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }
        .movie-card {
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgb(0 0 0 / 0.5);
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .movie-card:hover {
            transform: scale(1.05);
        }
        .movie-card img {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }
        .movie-info {
            padding: 10px;
        }
        .movie-title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 5px;
        }
        .movie-year {
            font-size: 14px;
            color: #aaa;
        }
        .modal-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 10px;
        }
        .modal {
            position: relative;
            background: #000;
            max-width: 800px;
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
        }
        .modal iframe {
            width: 100%;
            height: 450px;
            border: none;
        }
        .modal-close {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            user-select: none;
        }
        @media (max-width: 600px) {
            .movie-card img {
                height: 180px;
            }
            .modal iframe {
                height: 250px;
            }
        }
    </style>
</head>
<body>

<h1>Boom Flim Web</h1>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="মুভি সার্চ করুন..." />
</div>

<div id="movieSections"></div>

<div class="modal-bg" id="modalBg">
    <div class="modal">
        <span class="modal-close" id="modalClose">&times;</span>
        <iframe id="videoFrame" src="" allowfullscreen></iframe>
    </div>
</div>

<script>
    const sections = {
        "Trending Bengali": [
            {
                title: "Tandob (2025)",
                year: 2025,
                thumbnail: "https://i.ibb.co/gVRmv7m/tandob.jpg",
                videoUrl: "https://www.youtube.com/embed/dummy1"
            }
        ],
        "Love Stories": [
            {
                title: "Dil Bechara",
                year: 2020,
                thumbnail: "https://i.ibb.co/5Mgdpx7/dilbechara.jpg",
                videoUrl: "https://www.youtube.com/embed/GODAlxW5Pes"
            }
        ],
        "Hindi Movie": [
            {
                title: "3 Idiots",
                year: 2009,
                thumbnail: "https://image.tmdb.org/t/p/w500//66F4uO2P5zF2kVYahfA3Plgyp4S.jpg",
                videoUrl: "https://www.youtube.com/embed/xvszmNXdM4w"
            }
        ],
        "Bangla Movie": [
            {
                title: "Poran",
                year: 2022,
                thumbnail: "https://i.ibb.co/PrpL7r4/poran.jpg",
                videoUrl: "https://www.youtube.com/embed/dummy2"
            }
        ]
    };

    const movieSections = document.getElementById("movieSections");
    const modalBg = document.getElementById("modalBg");
    const modalClose = document.getElementById("modalClose");
    const videoFrame = document.getElementById("videoFrame");
    const searchInput = document.getElementById("searchInput");

    function createMovieCard(movie) {
        const card = document.createElement("div");
        card.className = "movie-card";
        card.innerHTML = `
            <img src="${movie.thumbnail}" alt="${movie.title}" />
            <div class="movie-info">
                <div class="movie-title">${movie.title}</div>
                <div class="movie-year">${movie.year}</div>
            </div>
        `;
        card.addEventListener("click", () => {
            videoFrame.src = movie.videoUrl + "?autoplay=1";
            modalBg.style.display = "flex";
        });
        return card;
    }

    function renderSections(filter = "") {
        movieSections.innerHTML = "";
        for (const [sectionName, movieList] of Object.entries(sections)) {
            const filteredMovies = movieList.filter(movie =>
                movie.title.toLowerCase().includes(filter.toLowerCase())
            );
            if (filteredMovies.length === 0) continue;

            const section = document.createElement("div");
            const title = document.createElement("div");
            title.className = "section-title";
            title.textContent = sectionName;

            const grid = document.createElement("div");
            grid.className = "movie-grid";

            filteredMovies.forEach(movie => {
                grid.appendChild(createMovieCard(movie));
            });

            section.appendChild(title);
            section.appendChild(grid);
            movieSections.appendChild(section);
        }

        if (movieSections.innerHTML === "") {
            movieSections.innerHTML = "<p style='text-align:center; color:#ccc;'>কোন মুভি পাওয়া যায়নি।</p>";
        }
    }

    modalClose.addEventListener("click", () => {
        videoFrame.src = "";
        modalBg.style.display = "none";
    });

    modalBg.addEventListener("click", e => {
        if (e.target === modalBg) {
            videoFrame.src = "";
            modalBg.style.display = "none";
        }
    });

    searchInput.addEventListener("input", () => {
        renderSections(searchInput.value);
    });

    renderSections();
</script>

</body>
</html>
