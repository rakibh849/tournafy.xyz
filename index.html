<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Fire Tournament</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            text-align: center;
        }
        header {
            background: rgba(0,0,0,0.7);
            padding: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            border-bottom: 2px solid #ffb400;
        }
        .description {
            padding: 20px;
            font-size: 1.2rem;
            line-height: 1.6;
            max-width: 800px;
            margin: auto;
        }
        .game-modes {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px auto;
            gap: 20px;
        }
        .mode-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            width: 250px;
            transition: 0.3s;
            cursor: pointer;
        }
        .mode-card:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.05);
            border-color: #ffb400;
        }
        footer {
            margin-top: 30px;
            padding: 15px;
            background: rgba(0,0,0,0.8);
            font-size: 0.9rem;
            color: #bbb;
        }
        a {
            color: #ffb400;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>🔥 Free Fire Tournament 🔥</header>

    <div class="description">
        আপনি একজন <strong>Esports প্লেয়ার</strong>? 🎮  
        গেম খেলে প্রতিদিন জিতে নিন <strong>500-1000 টাকা</strong> পর্যন্ত রিওয়ার্ড!  
        আমাদের ম্যাচগুলো পেইজে লাইভ দেখানো হয় 📺  
        যেকোন সমস্যায় <a href="https://t.me/yourtelegram" target="_blank">টেলিগ্রামে মেসেজ করুন</a>।
    </div>

    <div class="game-modes">
        <div class="mode-card">🏆 CLASSIC MATCH</div>
        <div class="mode-card">⚔️ CLASH SQUAD</div>
        <div class="mode-card">🐺 LONE WOLF</div>
    </div>

    <footer>
        &copy; 2025 Free Fire Tournament | Powered by YourName
    </footer>

</body>
</html>
